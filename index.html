<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastuak</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9;}
        .contenedor-principal { max-width: 800px; margin: 0 auto; }
        
        /* Nuevo estilo para poner el título y el selector juntos */
        .cabecera { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .cabecera select { padding: 8px 15px; font-size: 1.1em; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }

        .contenedor-grafico { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);}
        
        .grafico-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 1; 
        }
        
        .resumen-datos { 
            display: flex; 
            justify-content: space-around; 
            background: white; 
            padding: 20px; 
            margin-top: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .dato-caja { display: flex; flex-direction: column; align-items: center; }
        .dato-titulo { font-size: 0.85em; color: #666; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
        .dato-valor { font-weight: bold; font-size: 1.4em; }
        
        /* Media query para que se vea bien en móviles */
        @media (max-width: 600px) {
            .cabecera { flex-direction: column; gap: 10px; }
            
            /* Hacemos el gráfico más alto en el móvil (proporción 4/3 en lugar de 2/1) */
            .grafico-wrapper { aspect-ratio: 4 / 3; }
            
            /* Ajustamos el panel de abajo y achicamos las letras */
            .resumen-datos { flex-direction: column; gap: 10px; padding: 15px; }
            .dato-titulo { font-size: 0.75em; margin-bottom: 4px; }
            .dato-valor { font-size: 1.2em; }
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="cabecera">
            <h1 style="margin: 0;">Gastuak</h1>
            <select id="selectorMes"></select>
        </div>
        
        <div class="contenedor-grafico">
            <div class="grafico-wrapper">
                <canvas id="miGrafico"></canvas>
            </div>
        </div>
        <div id="resumen" class="resumen-datos"></div>
    </div>

    <script>
        let graficoInstancia = null; // Variable global para guardar el gráfico actual
        let datosGlobales = null;

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                datosGlobales = data;
                const selector = document.getElementById('selectorMes');
                
                // Rellenar el selector con los meses disponibles (ordenados de más reciente a más antiguo)
                const meses = Object.keys(data).sort().reverse();
                
                if (meses.length === 0) {
                    document.getElementById('resumen').innerHTML = '<p>Ez dago daturik.</p>';
                    return;
                }

                meses.forEach(mes => {
                    const option = document.createElement('option');
                    option.value = mes;
                    // Opcional: Formatear a algo como "2026-05"
                    option.textContent = mes; 
                    selector.appendChild(option);
                });

                // Dibujar el gráfico del mes más reciente por defecto
                dibujarGrafico(meses[0]);

                // Escuchar cuando el usuario cambia de mes en el desplegable
                selector.addEventListener('change', function() {
                    dibujarGrafico(this.value);
                });
            });

        function dibujarGrafico(mesSeleccionado) {
            const dataMes = datosGlobales[mesSeleccionado];
            
            // Si ya hay un gráfico dibujado, lo destruimos para no superponer
            if (graficoInstancia) {
                graficoInstancia.destroy();
            }

            const dias = Array.from({length: dataMes.dias_del_mes}, (_, i) => i + 1);
            const incrementoDiario = dataMes.presupuesto / dataMes.dias_del_mes;
            const lineaIdeal = dias.map(dia => incrementoDiario * dia);

            const datosReales = [];
            dataMes.gastos.forEach(gasto => {
                datosReales.push({x: gasto.dia, y: gasto.total});
            });

            const ctx = document.getElementById('miGrafico').getContext('2d');
            graficoInstancia = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dias,
                    datasets: [
                        {
                            label: 'Gasto Real Acumulado',
                            data: datosReales,
                            borderWidth: 3,
                            fill: true,
                            tension: 0.1,
                            spanGaps: true,
                            
                            pointBackgroundColor: context => {
                                const index = context.dataIndex;
                                const y = context.dataset.data[index]?.y;
                                if (y === undefined) return 'transparent';
                                const idealY = lineaIdeal[context.dataset.data[index].x - 1];
                                return y > idealY ? '#ff4d4d' : '#00b300';
                            },
                            pointBorderColor: context => {
                                const index = context.dataIndex;
                                const y = context.dataset.data[index]?.y;
                                if (y === undefined) return 'transparent';
                                const idealY = lineaIdeal[context.dataset.data[index].x - 1];
                                return y > idealY ? '#cc0000' : '#008000';
                            },
                            
                            segment: {
                                borderColor: ctx => {
                                    if (!ctx.p1.parsed) return '#00b300';
                                    const diaIndex = ctx.p1.parsed.x - 1;
                                    const ideal = lineaIdeal[diaIndex];
                                    return ctx.p1.parsed.y > ideal ? 'red' : '#00b300';
                                },
                                backgroundColor: ctx => {
                                    if (!ctx.p1.parsed) return 'rgba(0, 179, 0, 0.15)';
                                    const diaIndex = ctx.p1.parsed.x - 1;
                                    const ideal = lineaIdeal[diaIndex];
                                    return ctx.p1.parsed.y > ideal ? 'rgba(255, 0, 0, 0.15)' : 'rgba(0, 179, 0, 0.15)';
                                }
                            }
                        },
                        {
                            label: 'Ritmo Ideal (Presupuesto)',
                            data: lineaIdeal,
                            borderColor: '#0055ff',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            fill: false,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, suggestedMax: dataMes.presupuesto }
                    }
                }
            });

            // Actualizar la caja de resumen
            if (datosReales.length > 0) {
                const ultimoDato = datosReales[datosReales.length - 1];
                const gastoActual = ultimoDato.y;
                const limiteHoy = lineaIdeal[ultimoDato.x - 1];
                
                const desviacion = gastoActual - limiteHoy;
                const porcentaje = (desviacion / limiteHoy) * 100;

                const colorTexto = desviacion > 0 ? 'red' : '#00b300';
                const signo = desviacion > 0 ? '+' : ''; 

                document.getElementById('resumen').innerHTML = `
                    <div class="dato-caja">
                        <span class="dato-titulo">Egungo gastua</span>
                        <span class="dato-valor">${gastoActual.toFixed(2)} €</span>
                    </div>
                    <div class="dato-caja">
                        <span class="dato-titulo">Muga</span>
                        <span class="dato-valor">${limiteHoy.toFixed(2)} €</span>
                    </div>
                    <div class="dato-caja">
                        <span class="dato-titulo">Desbideratzea</span>
                        <span class="dato-valor" style="color: ${colorTexto};">${signo}${desviacion.toFixed(2)} €</span>
                    </div>
                    <div class="dato-caja">
                        <span class="dato-titulo">Desbideratzearen %</span>
                        <span class="dato-valor" style="color: ${colorTexto};">${signo}${porcentaje.toFixed(2)} %</span>
                    </div>
                `;
            } else {
                // He traducido el texto por defecto para que concuerde ;)
                document.getElementById('resumen').innerHTML = '<p style="color:#666;">Ez dago daturik hilabete honetan.</p>';
            }
        }
    </script>
</body>
</html>
